<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GovSummit 2026 Questionnaire</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --danger: #f85149;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      z-index: 100;
    }
    .menu-btn {
      width: 44px;
      height: 44px;
      margin: 0 -8px 0 0;
      padding: 0;
      border: none;
      background: none;
      color: var(--text);
      cursor: pointer;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .menu-btn:hover { background: rgba(255,255,255,0.06); }
    .menu-btn svg { width: 24px; height: 24px; }
    .header h1 {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 600;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }
    .overlay.open {
      opacity: 1;
      visibility: visible;
    }
    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      width: min(320px, 85vw);
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 201;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      overflow-y: auto;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .drawer-header h2 { margin: 0; font-size: 1.125rem; }
    .drawer-close {
      width: 36px;
      height: 36px;
      border: none;
      background: none;
      color: var(--text);
      cursor: pointer;
      border-radius: 8px;
    }
    .drawer-close:hover { background: rgba(255,255,255,0.06); }
    .drawer-body { padding: 20px; }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--muted);
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      font-size: 0.9375rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
    }
    .form-group input::placeholder { color: var(--muted); }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .drawer-actions { margin-top: 24px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      font-size: 0.9375rem;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    main {
      padding: 72px 24px 40px;
      max-width: 560px;
      margin: 0 auto;
    }
    .survey-title { font-size: 1.25rem; margin-bottom: 24px; }
    .question-block {
      margin-bottom: 28px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .question-block h3 {
      margin: 0 0 14px;
      font-size: 1rem;
      font-weight: 600;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
    }
    .option:hover { background: rgba(255,255,255,0.04); }
    .option input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }
    .option label { cursor: pointer; flex: 1; margin: 0; }
    .submit-wrap { margin-top: 32px; }
    .submit-wrap .btn { min-width: 160px; }
    .message {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
    }
    .message.success { background: rgba(46, 160, 67, 0.2); color: #3fb950; }
    .message.error { background: rgba(248, 81, 73, 0.15); color: var(--danger); }
    .message.info { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
  </style>
</head>
<body>
  <header class="header">
    <button type="button" class="menu-btn" id="menuBtn" aria-label="Open settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <h1>GovSummit 2026</h1>
  </header>

  <div class="overlay" id="overlay" aria-hidden="true"></div>
  <aside class="drawer" id="drawer" aria-label="Splunk HEC settings">
    <div class="drawer-header">
      <h2>Splunk HEC</h2>
      <button type="button" class="drawer-close" id="drawerClose" aria-label="Close">✕</button>
    </div>
    <div class="drawer-body">
      <div class="form-group">
        <label for="hecHost">Host / IP</label>
        <input type="text" id="hecHost" placeholder="e.g. splunk.example.com" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="hecPort">Port</label>
        <input type="text" id="hecPort" placeholder="8088" inputmode="numeric" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="hecToken">HEC Token</label>
        <input type="password" id="hecToken" placeholder="Your HEC token" autocomplete="off">
      </div>
      <div class="drawer-actions">
        <button type="button" class="btn btn-primary" id="saveSettings">Save</button>
      </div>
    </div>
  </aside>

  <main>
    <h2 class="survey-title">GovSummit 2026 Questionnaire</h2>

    <form id="surveyForm">
      <div class="question-block">
        <h3>1. What branch of the military are you / have you been a part of?</h3>
        <div class="options">
          <label class="option">
            <input type="radio" name="q1" value="Air Force" required>
            <span>Air Force</span>
          </label>
          <label class="option">
            <input type="radio" name="q1" value="Army">
            <span>Army</span>
          </label>
          <label class="option">
            <input type="radio" name="q1" value="Coast Guard">
            <span>Coast Guard</span>
          </label>
          <label class="option">
            <input type="radio" name="q1" value="Marine Corps">
            <span>Marine Corps</span>
          </label>
          <label class="option">
            <input type="radio" name="q1" value="Navy">
            <span>Navy</span>
          </label>
          <label class="option">
            <input type="radio" name="q1" value="Space Force">
            <span>Space Force</span>
          </label>
        </div>
      </div>

      <div class="question-block">
        <h3>2. What regions have you served in?</h3>
        <div class="options">
          <label class="option">
            <input type="radio" name="q2" value="Africa" required>
            <span>Africa</span>
          </label>
          <label class="option">
            <input type="radio" name="q2" value="Asia">
            <span>Asia</span>
          </label>
          <label class="option">
            <input type="radio" name="q2" value="Europe">
            <span>Europe</span>
          </label>
          <label class="option">
            <input type="radio" name="q2" value="Latin America & the Caribbean">
            <span>Latin America &amp; the Caribbean</span>
          </label>
          <label class="option">
            <input type="radio" name="q2" value="Northern America">
            <span>Northern America</span>
          </label>
          <label class="option">
            <input type="radio" name="q2" value="Oceania">
            <span>Oceania</span>
          </label>
        </div>
      </div>

      <div class="question-block">
        <h3>3. How many years did you serve?</h3>
        <div class="options">
          <label class="option">
            <input type="radio" name="q3" value="less than 5 years" required>
            <span>less than 5 years</span>
          </label>
          <label class="option">
            <input type="radio" name="q3" value="5 - 10 years">
            <span>5 - 10 years</span>
          </label>
          <label class="option">
            <input type="radio" name="q3" value="10 - 15 years">
            <span>10 - 15 years</span>
          </label>
          <label class="option">
            <input type="radio" name="q3" value="15 - 20 years">
            <span>15 - 20 years</span>
          </label>
          <label class="option">
            <input type="radio" name="q3" value="20+ years">
            <span>20+ years</span>
          </label>
        </div>
      </div>

      <div class="question-block">
        <h3>4. What were your main areas of service or specialties?</h3>
        <div class="options">
          <label class="option">
            <input type="radio" name="q4" value="Cyber Warfare" required>
            <span>Cyber Warfare</span>
          </label>
          <label class="option">
            <input type="radio" name="q4" value="Infantry">
            <span>Infantry</span>
          </label>
          <label class="option">
            <input type="radio" name="q4" value="Logistics and Supply Chain">
            <span>Logistics and Supply Chain</span>
          </label>
          <label class="option">
            <input type="radio" name="q4" value="Medical Services">
            <span>Medical Services</span>
          </label>
        </div>
      </div>

      <div class="submit-wrap">
        <button type="submit" class="btn btn-primary" id="submitBtn">Submit</button>
        <div id="message" class="message" role="status" aria-live="polite" style="display: none;"></div>
      </div>
    </form>
  </main>

  <script>
    (function () {
      var STORAGE_KEY = 'splunk_hec_config';

      function getConfig() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : {};
        } catch (e) {
          return {};
        }
      }

      function saveConfig(host, port, token) {
        var cfg = { host: (host || '').trim(), port: (port || '').trim(), token: (token || '').trim() };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
      }

      var menuBtn = document.getElementById('menuBtn');
      var overlay = document.getElementById('overlay');
      var drawer = document.getElementById('drawer');
      var drawerClose = document.getElementById('drawerClose');
      var hecHost = document.getElementById('hecHost');
      var hecPort = document.getElementById('hecPort');
      var hecToken = document.getElementById('hecToken');
      var saveSettings = document.getElementById('saveSettings');
      var surveyForm = document.getElementById('surveyForm');
      var submitBtn = document.getElementById('submitBtn');
      var messageEl = document.getElementById('message');

      function openDrawer() {
        var cfg = getConfig();
        hecHost.value = cfg.host || '';
        hecPort.value = cfg.port || '8088';
        hecToken.value = cfg.token || '';
        drawer.classList.add('open');
        overlay.classList.add('open');
        drawer.setAttribute('aria-hidden', 'false');
        overlay.setAttribute('aria-hidden', 'false');
      }

      function closeDrawer() {
        drawer.classList.remove('open');
        overlay.classList.remove('open');
        drawer.setAttribute('aria-hidden', 'true');
        overlay.setAttribute('aria-hidden', 'true');
      }

      function showMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = 'message ' + (type || 'info');
        messageEl.style.display = 'block';
      }

      function hideMessage() {
        messageEl.style.display = 'none';
      }

      menuBtn.addEventListener('click', openDrawer);
      drawerClose.addEventListener('click', closeDrawer);
      overlay.addEventListener('click', closeDrawer);

      saveSettings.addEventListener('click', function () {
        var host = hecHost.value.trim();
        var port = hecPort.value.trim();
        var token = hecToken.value.trim();
        if (!host || !port || !token) {
          showMessage('Please fill Host, Port, and HEC Token.', 'error');
          return;
        }
        saveConfig(host, port, token);
        showMessage('Settings saved. Close the menu and submit the form when ready.', 'success');
      });

      surveyForm.addEventListener('submit', function (e) {
        e.preventDefault();
        hideMessage();

        var cfg = getConfig();
        if (!cfg.host || !cfg.port || !cfg.token) {
          showMessage('Open the menu (☰) and set Splunk host, port, and HEC token first.', 'error');
          return;
        }

        var answers = {
          '1': document.querySelector('input[name="q1"]:checked').value,
          '2': document.querySelector('input[name="q2"]:checked').value,
          '3': document.querySelector('input[name="q3"]:checked').value,
          '4': document.querySelector('input[name="q4"]:checked').value
        };

        var url = 'https://' + cfg.host + ':' + cfg.port + '/services/collector/event';
        var payload = {
          event: answers,
          sourcetype: 'hec_form_survey'
        };

        submitBtn.disabled = true;
        showMessage('Sending…', 'info');

        fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Splunk ' + cfg.token
          },
          body: JSON.stringify(payload)
        })
          .then(function (res) {
            if (res.ok) {
              showMessage('Submitted successfully.', 'success');
              surveyForm.reset();
            } else {
              return res.text().then(function (t) {
                throw new Error(res.status + ': ' + (t || res.statusText));
              });
            }
          })
          .catch(function (err) {
            var msg = err.message || 'Submit failed.';
            if (msg.indexOf('Failed to fetch') !== -1 || msg.indexOf('NetworkError') !== -1) {
              msg = 'Network error. If Splunk is on another domain, it may need to allow CORS for this site. Check the browser console.';
            }
            showMessage(msg, 'error');
          })
          .finally(function () {
            submitBtn.disabled = false;
          });
      });
    })();
  </script>
</body>
</html>
